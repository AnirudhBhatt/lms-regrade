<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="ReGrade — A controlled, auditable regrading workflow for fair grade dispute resolution in LMS.">
  <title>ReGrade — LMS Regrading Workflow</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/index.css?v=4">
  <link rel="stylesheet" href="css/components.css?v=4">
  <link rel="stylesheet" href="css/views.css?v=4">
</head>
<body>
  <div id="app">
    <!-- Sidebar -->
    <aside id="sidebar" class="sidebar hidden">
      <div class="sidebar-logo" style="padding: var(--space-sm) var(--space-md);">
        <div style="background: #ffffff; padding: var(--space-xs) var(--space-sm); border-radius: var(--radius-md); width: 100%; display: flex; align-items: center; justify-content: center; box-shadow: 0 2px 8px rgba(0,0,0,0.15);">
          <img src="upes_logo.png" alt="UPES Logo" style="max-height: 38px; max-width: 100%; object-fit: contain;">
        </div>
      </div>
      <nav id="sidebar-nav" class="sidebar-nav"></nav>
      <div class="sidebar-footer">
        <div id="current-user-info" class="user-info"></div>
        <button id="logout-btn" class="btn-logout">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/>
          </svg>
          Switch Role
        </button>
      </div>
    </aside>

    <!-- Main Content Area -->
    <div id="main-wrapper" class="main-wrapper">
      <!-- Topbar -->
      <header id="topbar" class="topbar hidden">
        <div class="topbar-left">
          <button id="sidebar-toggle" class="icon-btn" aria-label="Toggle sidebar">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M4 6h16M4 12h16M4 18h16"/>
            </svg>
          </button>
          <h1 id="page-title" class="page-title"></h1>
        </div>
        <div class="topbar-right">
          <button id="notif-btn" class="icon-btn notif-btn" aria-label="Notifications" title="Notifications">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"/>
            </svg>
            <span id="notif-badge" class="notif-badge hidden">0</span>
          </button>
          <div id="user-avatar" class="user-avatar"></div>
        </div>
      </header>

      <!-- Page Content -->
      <main id="page-content" class="page-content"></main>
    </div>
  </div>

  <!-- Notification Drawer -->
  <div id="notif-drawer" class="notif-drawer hidden">
    <div class="notif-drawer-header">
      <h3>Notifications</h3>
      <button id="mark-all-read-btn" class="btn-link">Mark all read</button>
      <button id="close-drawer-btn" class="icon-btn" aria-label="Close notifications">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M6 18L18 6M6 6l12 12"/>
        </svg>
      </button>
    </div>
    <div id="notif-list" class="notif-list"></div>
  </div>

  <!-- Toast Container -->
  <div id="toast-container" class="toast-container" aria-live="polite"></div>

  <!-- Overlay -->
  <div id="overlay" class="overlay hidden"></div>

  <!-- Scripts (order matters — no ES modules for file:// compatibility) -->
  <script src="js/store.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/audit.js"></script>
  <script src="js/notifications.js"></script>
  <script src="js/views/login.js"></script>
  <script src="js/views/dashboard.js"></script>
  <script src="js/views/grade-view.js"></script>
  <script src="js/views/request-form.js"></script>
  <script src="js/views/queue.js"></script>
  <script src="js/views/review.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
